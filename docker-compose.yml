version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Voice AI Production — Docker Compose (Development)
#  Starts all 8 microservices + infrastructure
# ══════════════════════════════════════════════════════════════

networks:
  voice-ai-net:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
  kafka-data:
  prometheus-data:
  grafana-data:
  models-data:

services:

  # ─── Infrastructure ────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: [redis-data:/data]
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    networks: [voice-ai-net]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voiceai
      POSTGRES_USER: voiceai
      POSTGRES_PASSWORD: devpassword
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks: [voice-ai-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voiceai"]
      interval: 10s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks: [voice-ai-net]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [voice-ai-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [kafka]
    networks: [voice-ai-net]
    command: >
      bash -c "
        sleep 10 &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 8 --replication-factor 1 --topic voice.audio.raw &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 4 --replication-factor 1 --topic voice.transcripts &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 4 --replication-factor 1 --topic voice.emotions &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 4 --replication-factor 1 --topic voice.fraud.signals &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 4 --replication-factor 1 --topic voice.llm.responses &&
        kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 2 --replication-factor 1 --topic voice.escalations &&
        echo 'Kafka topics created'
      "

  # ─── Microservices ─────────────────────────────────────────

  audio-ingress-svc:
    build: ./services/audio-ingress-svc
    ports: ["8001:8001"]
    env_file: [.env]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_NAME: audio-ingress-svc
    depends_on: [kafka]
    networks: [voice-ai-net]
    restart: unless-stopped

  stt-svc:
    build: ./services/stt-svc
    ports: ["8002:8002"]
    env_file: [.env]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_NAME: stt-svc
    volumes: [models-data:/models]
    networks: [voice-ai-net]
    restart: unless-stopped

  emotion-svc:
    build: ./services/emotion-svc
    ports: ["8003:8003"]
    env_file: [.env]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_NAME: emotion-svc
    volumes: [models-data:/models]
    networks: [voice-ai-net]
    restart: unless-stopped

  fraud-svc:
    build: ./services/fraud-svc
    ports: ["8004:8004"]
    env_file: [.env]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SERVICE_NAME: fraud-svc
    volumes: [models-data:/models]
    networks: [voice-ai-net]
    restart: unless-stopped

  context-svc:
    build: ./services/context-svc
    ports: ["8005:8005"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: devpassword
      SERVICE_NAME: context-svc
    depends_on: [redis, postgres]
    networks: [voice-ai-net]
    restart: unless-stopped

  llm-orchestrator-svc:
    build: ./services/llm-orchestrator-svc
    ports: ["8006:8006"]
    env_file: [.env]
    environment:
      CONTEXT_SVC_URL: http://context-svc:8005
      EMOTION_SVC_URL: http://emotion-svc:8003
      FRAUD_SVC_URL: http://fraud-svc:8004
      URGENCY_SVC_URL: http://urgency-escalation-svc:8007
      SERVICE_NAME: llm-orchestrator-svc
    depends_on: [context-svc, emotion-svc, fraud-svc]
    networks: [voice-ai-net]
    restart: unless-stopped

  urgency-escalation-svc:
    build: ./services/urgency-escalation-svc
    ports: ["8007:8007"]
    env_file: [.env]
    environment:
      REDIS_URL: redis://redis:6379/0
      SERVICE_NAME: urgency-escalation-svc
    depends_on: [redis]
    networks: [voice-ai-net]
    restart: unless-stopped

  tts-svc:
    build: ./services/tts-svc
    ports: ["8008:8008"]
    env_file: [.env]
    environment:
      SERVICE_NAME: tts-svc
    networks: [voice-ai-net]
    restart: unless-stopped

  # ─── Monitoring ────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.48.0
    ports: ["9090:9090"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks: [voice-ai-net]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  grafana:
    image: grafana/grafana:10.2.0
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/voice-ai.json
    depends_on: [prometheus]
    networks: [voice-ai-net]
